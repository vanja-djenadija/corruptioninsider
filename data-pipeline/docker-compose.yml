services:
  db:
    image: postgres:16-alpine
    container_name: pyhack_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pyhack}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pyhack_secret}
      POSTGRES_DB: ${POSTGRES_DB:-pyhackcorruption}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pyhack} -d ${POSTGRES_DB:-pyhackcorruption}"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pyhack_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      - db
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  pgadmin_data:
