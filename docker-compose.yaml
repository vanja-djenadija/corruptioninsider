services:

  postgres:
    image: postgres:15
    container_name: corruptioninsider-postgres
    ports:
      - "127.0.0.1:5432:5432"
    restart: always
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - corruptioninsider-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: data-pipeline/Dockerfile
    container_name: corruptioninsider-migrate
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - corruptioninsider-net
    restart: "no"
    command: ["alembic", "upgrade", "head"]

  backend:
    build: ./backend
    image: corruptioninsider-backend
    container_name: corruptioninsider-backend
    restart: always
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - corruptioninsider-net

  frontend:
    build: ./frontend
    image: corruptioninsider-frontend
    container_name: corruptioninsider-frontend
    restart: always
    env_file:
      - .env
    depends_on:
      - backend
    networks:
      - corruptioninsider-net

  nginx:
    image: nginx:latest
    container_name: corruptioninsider-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
      - frontend
    networks:
      - corruptioninsider-net

volumes:
  postgres_data:

networks:
  corruptioninsider-net:
    driver: bridge