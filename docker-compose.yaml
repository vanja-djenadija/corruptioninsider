services:

  postgres:
    image: postgres:15
    container_name: corruptioninsider-postgres
    restart: always
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - corruptioninsider-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    image: corruptioninsider-backend
    container_name: corruptioninsider-backend
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - corruptioninsider-net

  frontend:
    build: ./frontend
    image: corruptioninsider-frontend
    container_name: corruptioninsider-frontend
    restart: always
    env_file:
      - .env
    depends_on:
      - backend
    networks:
      - corruptioninsider-net

  nginx:
    image: nginx:latest
    container_name: corruptioninsider-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - corruptioninsider-net

volumes:
  postgres_data:

networks:
  corruptioninsider-net:
    driver: bridge